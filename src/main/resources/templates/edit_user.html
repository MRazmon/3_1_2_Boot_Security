<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add/Edit User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2 th:if="${user.id == null}">Add New User</h2>
    <h2 th:unless="${user.id == null}">Edit User</h2>

    <form th:action="@{${user.id == null ? '/admin/add' : '/admin/edit'}}" method="post">
        <input type="hidden" name="id" th:value="${user.id}">

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" th:value="${user.username}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" th:value="${user.email}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Leave blank to keep current">
        </div>

        <div class="mb-3">
            <label class="form-label">Roles</label>
            <select name="roleIds" class="form-select" multiple>
                <option th:each="role : ${roles}"
                        th:value="${role.id}"
                        th:text="${role.name}"
                        th:selected="${user.roles.contains(role)}">
                </option>
            </select>
        </div>

        <button type="submit" class="btn btn-success">Save</button>
        <a href="/admin" class="btn btn-secondary">Cancel</a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
